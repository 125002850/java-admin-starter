spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true

platform:
  file:
    storage:
      type: minio
      zone-id: ${FILE_STORAGE_ZONE_ID:Asia/Shanghai}
      minio:
        endpoint: ${FILE_STORAGE_MINIO_ENDPOINT}
        access-key: ${FILE_STORAGE_MINIO_ACCESS_KEY}
        secret-key: ${FILE_STORAGE_MINIO_SECRET_KEY}
        bucket-name: ${FILE_STORAGE_MINIO_BUCKET_NAME}
        base-url: ${FILE_STORAGE_MINIO_BASE_URL}
        private-bucket: ${FILE_STORAGE_MINIO_PRIVATE_BUCKET:true}
        download-url-expire-seconds: ${FILE_STORAGE_MINIO_DOWNLOAD_URL_EXPIRE_SECONDS:1200}
        region: ${FILE_STORAGE_MINIO_REGION:}
        connect-timeout: ${FILE_STORAGE_MINIO_CONNECT_TIMEOUT:10}
        read-timeout: ${FILE_STORAGE_MINIO_READ_TIMEOUT:30}
        write-timeout: ${FILE_STORAGE_MINIO_WRITE_TIMEOUT:0}
