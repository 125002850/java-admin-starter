spring:
  application:
    name: java-demo
  profiles:
    active: dev

management:
  endpoints:
    web:
      exposure:
        include: health,info

knife4j:
  enable: true

demo:
  file:
    storage:
      type: local
      zone-id: Asia/Shanghai
      local:
        root-dir: ${java.io.tmpdir}/java-demo/uploads
        base-url: /local-files
