spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/java_demo?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root
    hikari:
      minimum-idle: 10
      maximum-pool-size: 20
      idle-timeout: 500000
      max-lifetime: 540000
      connection-timeout: 60000
      connection-test-query: SELECT 1

logging:
  level:
    root: INFO
    com.demo: DEBUG
    com.github.xiaoymin.knife4j: DEBUG
    org.springdoc: DEBUG
