spring:
  datasource:
    url: ${JAVA_DEMO_DATASOURCE_URL:jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false}
    username: ${JAVA_DEMO_DATASOURCE_USERNAME:sa}
    password: ${JAVA_DEMO_DATASOURCE_PASSWORD:}
  flyway:
    enabled: true

platform:
  file:
    storage:
      type: local
      zone-id: Asia/Shanghai
      local:
        root-dir: ${java.io.tmpdir}/java-demo/test-uploads
        base-url: /local-files

mybatis-plus:
  global-config:
    db-config:
      logic-delete-value: unix_timestamp()
      logic-not-delete-value: 0
