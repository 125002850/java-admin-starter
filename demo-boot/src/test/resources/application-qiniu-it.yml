spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true

demo:
  file:
    storage:
      type: qiniu
      zone-id: Asia/Shanghai
      qiniu:
        access-key: ${DEMO_FILE_QINIU_ACCESS_KEY}
        secret-key: ${DEMO_FILE_QINIU_SECRET_KEY}
        bucket-name: ${DEMO_FILE_QINIU_BUCKET_NAME}
        base-url: ${DEMO_FILE_QINIU_BASE_URL}
        upload-host: ${DEMO_FILE_QINIU_UPLOAD_HOST:https://upload.qiniup.com}
        private-bucket: ${DEMO_FILE_QINIU_PRIVATE_BUCKET:true}
        upload-token-expire-seconds: ${DEMO_FILE_QINIU_UPLOAD_TOKEN_EXPIRE_SECONDS:600}
        download-url-expire-seconds: ${DEMO_FILE_QINIU_DOWNLOAD_URL_EXPIRE_SECONDS:1200}
        region: ${DEMO_FILE_QINIU_REGION:huadong}
